<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHOST Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d1a; color: #e0e0e0; }
    .header { padding: 16px 24px; background: #1a1a2e; border-bottom: 1px solid #2a2a3e; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; color: #a0a0ff; }
    .content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    .card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; padding: 16px; }
    .card h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .big-number { font-size: 36px; font-weight: 700; }
    .chart-placeholder { height: 200px; background: #0d0d1a; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #444; }
    .session-list { list-style: none; }
    .session-list li { padding: 8px 0; border-bottom: 1px solid #2a2a3e; font-size: 13px; display: flex; justify-content: space-between; }
    .settings-link { color: #6060ff; text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>GHOST Convergence Dashboard</h1>
    <a href="../popup/popup.html" class="settings-link">Monitor</a>
  </div>

  <div class="content">
    <div class="grid">
      <div class="card">
        <h2>Current Score</h2>
        <div class="big-number" id="current-score">0.00</div>
      </div>
      <div class="card">
        <h2>Intervention Level</h2>
        <div class="big-number" id="current-level">0</div>
      </div>
      <div class="card">
        <h2>Active Sessions</h2>
        <div class="big-number" id="active-sessions">0</div>
      </div>
    </div>

    <div class="grid" style="margin-top: 16px;">
      <div class="card">
        <h2>Signal Trends</h2>
        <div class="chart-placeholder">Chart loads with data</div>
      </div>
      <div class="card">
        <h2>Recent Sessions</h2>
        <ul class="session-list" id="session-list">
          <li><span>No sessions recorded</span></li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
