# GHOST Platform — cargo-deny configuration
# Run via `cargo deny check`

[advisories]
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",
    "CDLA-Permissive-2.0",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CC0-1.0",
]

[bans]
# This workspace spans multiple OS-specific stacks and large upstream graphs;
# duplicate semver lines are common and are covered by the advisories gate.
multiple-versions = "allow"
# Workspace-managed dependencies appear as wildcards to cargo-deny but are
# centrally versioned at the workspace root, so do not gate on them here.
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
