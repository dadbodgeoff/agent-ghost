# GHOST Platform Configuration
# See schemas/ghost-config.example.yml for full reference.

gateway:
  bind: "127.0.0.1"
  port: 39780
  db_path: "~/.ghost/data/ghost.db"

agents:
  - name: "ghost"
    spending_cap: 5.0
    full_access: true
    capabilities:
      - "web_search"
      - "file_read"
      - "memory_write"
    isolation: inprocess

channels:
  - channel_type: cli
    agent: "ghost"

models:
  default_provider: "openai_compat"
  providers:
    # ChatGPT/Codex subscription-backed option:
    - name: "codex"
      api_key_env: ""
      # model: "default" # optional; omit to let Codex choose
      # Set api_key_env to a real env var name to use API-key-backed Codex instead.
    - name: "openai_compat"
      base_url: "https://api.x.ai"
      model: "grok-4-1-fast-reasoning"
      api_key_env: "XAI_API_KEY"
    - name: "ollama"
      base_url: "http://localhost:11434"
      model: "qwen3.5:9b"

tools:
  web_search:
    backend: "searxng"
    searxng_url: "http://localhost:8888"
    max_results: 5
  web_fetch:
    allow_http: false
    timeout_secs: 15
  shell:
    # Empty string prefix = allow any shell command. Testing only.
    allowed_prefixes: [""]
    timeout_secs: 30

pc_control:
  enabled: false
  allowed_apps: []

convergence:
  profile: "standard"

backup:
  enabled: false
  interval: "daily"
  retention_count: 7
