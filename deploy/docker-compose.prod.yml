# Production multi-node deployment (Req 40 AC2).

services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "18789:18789"
    volumes:
      - ghost-data:/home/ghost/.ghost
      - ./ghost.yml:/home/ghost/.ghost/config/ghost.yml:ro
    environment:
      - GHOST_TOKEN=${GHOST_TOKEN}
      - GHOST_BACKUP_KEY=${GHOST_BACKUP_KEY}
      - GHOST_CONTACT_EMAIL=${GHOST_CONTACT_EMAIL}
      - GHOST_WEBHOOK_URL=${GHOST_WEBHOOK_URL}
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: always
    healthcheck:
      test: ["CMD", "ghost", "status"]
      interval: 15s
      timeout: 5s
      retries: 5

  monitor:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["serve", "--monitor-mode"]
    ports:
      - "18790:18790"
    volumes:
      - ghost-data:/home/ghost/.ghost
    environment:
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: always

  dashboard:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ../dashboard:/app:ro
    command: ["npx", "vite", "preview", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

volumes:
  ghost-data:
