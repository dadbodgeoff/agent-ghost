apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ghost.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "ghost.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  ghost.yml: |
    gateway:
      bind: "{{ .Values.gateway.bind }}"
      port: {{ .Values.gateway.port }}
      db_path: "{{ .Values.gateway.dbPath }}"
    convergence:
      profile: "{{ .Values.convergence.profile }}"
      monitor:
        address: "{{ .Values.convergence.monitorAddress }}"
    security:
      soul_drift_threshold: {{ .Values.security.soulDriftThreshold }}
    mesh:
      enabled: {{ .Values.mesh.enabled }}
      min_trust_for_delegation: {{ .Values.mesh.minTrustForDelegation }}
      max_delegation_depth: {{ .Values.mesh.maxDelegationDepth }}
    secrets:
      provider: env
    models:
      providers: []
    agents: []
    channels: []
