name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Criterion Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Run benchmarks on the PR branch
      - name: Run benchmarks (PR)
        run: cargo bench --workspace -- --output-format bencher | tee pr-bench.txt

      # Checkout base branch and run benchmarks
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          clean: false

      - name: Run benchmarks (base)
        run: cargo bench --workspace -- --output-format bencher | tee base-bench.txt
        continue-on-error: true

      # Compare results
      - name: Compare benchmarks
        id: compare
        run: |
          if [ -f base-bench.txt ] && [ -s base-bench.txt ]; then
            echo "Base benchmarks available — comparing"
            # Simple regression check: flag if any benchmark regressed >10%
            echo "benchmark_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No base benchmarks — skipping comparison"
            echo "benchmark_available=false" >> "$GITHUB_OUTPUT"
          fi
