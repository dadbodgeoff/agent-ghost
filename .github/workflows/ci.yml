name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-feature-flags:
    name: Test Feature Flags
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # ghost-secrets: keychain feature (requires OS keychain)
          - os: ubuntu-latest
            crate: ghost-secrets
            features: "keychain"
          - os: macos-latest
            crate: ghost-secrets
            features: "keychain"
          # ghost-secrets: vault feature
          - os: ubuntu-latest
            crate: ghost-secrets
            features: "vault"
          # ghost-secrets: no default features (env-only)
          - os: ubuntu-latest
            crate: ghost-secrets
            features: ""
            no_default: true
          # ghost-egress: eBPF feature (Linux only)
          - os: ubuntu-latest
            crate: ghost-egress
            features: "ebpf"
          # ghost-egress: pf feature (macOS only)
          - os: macos-latest
            crate: ghost-egress
            features: "pf"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test with features
        run: |
          if [ "${{ matrix.no_default }}" = "true" ]; then
            cargo test -p ${{ matrix.crate }} --no-default-features
          elif [ -n "${{ matrix.features }}" ]; then
            cargo test -p ${{ matrix.crate }} --features "${{ matrix.features }}"
          else
            cargo test -p ${{ matrix.crate }}
          fi

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check

  extension-lint:
    name: Extension Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          if [ -f package.json ]; then
            npm ci
            npm run lint --if-present
          else
            echo "No package.json in extension/ — skipping"
          fi

  dashboard-lint:
    name: Dashboard Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: |
          if [ -f dashboard/package.json ]; then
            pnpm --dir dashboard lint --if-present
            pnpm --dir dashboard check --if-present
          else
            echo "No package.json in dashboard/ — skipping"
          fi

  dashboard-build:
    name: Dashboard Build (PWA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: |
          if [ -f dashboard/package.json ]; then
            pnpm --dir dashboard build --if-present
          else
            echo "No package.json in dashboard/ — skipping"
          fi
      - name: Validate PWA manifest
        run: |
          if [ -f dashboard/static/manifest.json ]; then
            python3 -c "import json; json.load(open('dashboard/static/manifest.json'))" && echo "manifest.json is valid JSON"
          fi

  dashboard-e2e:
    name: Dashboard E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: |
          if [ -f dashboard/package.json ]; then
            pnpm --dir dashboard build --if-present
            npx playwright install --with-deps chromium
            pnpm --dir dashboard test:e2e:service-worker
          else
            echo "No package.json in dashboard/ — skipping"
          fi

  architecture-guards:
    name: Architecture Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OpenAPI parity
        run: python3 scripts/check_openapi_parity.py --fail-on-drift
      - name: Dashboard architecture
        run: python3 scripts/check_dashboard_architecture.py
